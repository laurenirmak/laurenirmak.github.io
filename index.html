<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Lauren Irmak</title>
  <meta name="description" content="JD candidate with a passion for culture and law." />
  <link rel="canonical" href="https://laurenirmak.com/" />
  <meta name="robots" content="index, follow" />

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Times New Roman", Times, serif;
      background: #f7f2ec;
      color: #222;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 30px;
    }

    .card {
      max-width: 850px;
      width: 100%;
      background: white;
      border-radius: 28px;
      padding: 55px 40px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.10);
    }

    img {
      width: 170px;
      height: 170px;
      object-fit: cover;
      border-radius: 50%;
      margin-bottom: 25px;
    }

    h1 {
      font-size: 64px;
      font-weight: 400;
      margin: 0;
      letter-spacing: 0.5px;
    }

    .tagline {
      font-family: "Times New Roman", Times, serif;
      text-transform: uppercase;
      letter-spacing: 5px;
      color: #7a6557;
      font-size: 14px;
      margin-top: 15px;
    }

    .divider {
      width: 90px;
      height: 1px;
      background: #c8b8aa;
      margin: 35px auto;
    }

    .bio {
      font-family: "Times New Roman", Times, serif;
      font-size: 18px;
      line-height: 1.8;
      max-width: 620px;
      margin: 0 auto 35px;
    }

    .links {
      display: flex;
      justify-content: center;
      gap: 18px;
      flex-wrap: wrap;
    }

    .links a {
      font-family: "Times New Roman", Times, serif;
      text-decoration: none;
      color: #222;
      border: 1px solid #cdbdaf;
      border-radius: 8px;
      padding: 14px 34px;
      letter-spacing: 2px;
      font-size: 13px;
      text-transform: uppercase;
    }

    .links a:hover {
      background: #222;
      color: white;
    }

    footer {
      margin-top: 38px;
      font-family: "Times New Roman", Times, serif;
      color: #8a7a70;
      font-size: 14px;
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 42px;
      }

      .tagline {
        letter-spacing: 3px;
        font-size: 12px;
      }

      .card {
        padding: 38px 24px;
      }
    }
  </style>
</head>

<body>
  <main class="card">
    <img src="profile.png" alt="Lauren Irmak" />

    <h1>Lauren Irmak</h1>

    <p class="tagline">JD Candidate with a Passion for Culture and Law</p>

    <div class="divider"></div>

    <p class="bio">
      My goal is to conduct research about how culture impacts legal decisions.  
    </p>

    <div class="links">
      <a href="laurenirmak@gmail.com">Email</a>
      <a href="https://www.linkedin.com/in/laurenirmak">LinkedIn</a>
    </div>

    <footer>© 2026 Lauren Irmak</footer>
  </main>
</body>
</html>
